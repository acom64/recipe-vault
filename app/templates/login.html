{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-layout">
  <section class="auth-panel">
    <p class="eyebrow">Welcome Back</p>
    <h1>Log in</h1>
    <p class="auth-copy">Access your recipes, meal planner, and shopping list.</p>

    <form method="POST" class="auth-form">
      <div>
        <label for="username" class="form-label">Username</label>
        <div class="input-icon">
          <i class="bi bi-person" aria-hidden="true"></i>
          <input type="text" class="form-control form-control-lg" id="username" name="username" autocomplete="username" value="{{ username|default('') }}" required>
        </div>
      </div>

      <div>
        <label for="password" class="form-label">Password</label>
        <div class="input-icon">
          <i class="bi bi-lock" aria-hidden="true"></i>
          <input type="password" class="form-control form-control-lg" id="password" name="password" autocomplete="current-password" required>
        </div>
      </div>

      <div class="form-check auth-remember">
        <input class="form-check-input" type="checkbox" value="1" id="remember" name="remember" {% if remember|default(false) %}checked{% endif %}>
        <label class="form-check-label" for="remember">
          Stay logged in on this device
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100" data-loading-text="Logging in...">
        <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
        Log in
      </button>
    </form>

    <p class="auth-switch">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </p>
  </section>

  <aside class="auth-aside">
    <img src="{{ url_for('static', filename='img/recipe-vault-hero.png') }}" alt="Meal planning tablet with fresh ingredients">
  </aside>
</div>
{% endblock %}
