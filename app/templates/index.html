{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="p-4 p-md-5 mb-4 bg-light rounded-3">
    <h1 class="display-5 fw-bold">Recipe Vault</h1>
    <p class="col-md-8 fs-4">
        Save recipes, organize ingredients, and build shopping lists.
    </p>
    {% if current_user.is_authenticated %}
    <a class="btn btn-primary btn-lg" href="{{ url_for('recipes') }}">View Recipes</a>
    {% else %}
    <div class="d-flex flex-column flex-sm-row gap-2">
        <a class="btn btn-primary btn-lg" href="{{ url_for('login') }}">Log In</a>
        <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('register') }}">Create an Account</a>
    </div>
    {% endif %}
</div>
{% endblock %}
