{% extends "base.html" %}

{% block title %}Recipes{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="mb-1">Recipes</h1>
        <p class="text-muted mb-0">Browse your saved meals and ingredients.</p>
    </div>

    <a class="btn btn-primary" href="/recipes/new">Add Recipe</a>
</div>

<div class="row g-4">
    {% for recipe in recipes %}
    <div class="col-md-6 col-lg-4">
        <a href="/recipes/{{ recipe.id }}" class="text-decoration-none text-dark">
            <div class="card recipe-card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ recipe.title }}</h5>
                    <p class="card-text text-muted">
                        {{ recipe.description or "No description added." }}
                    </p>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
